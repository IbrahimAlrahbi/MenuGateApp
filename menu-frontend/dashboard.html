<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Gate — My Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ── Navigation ── -->
  <nav class="mg-nav" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="mg-nav__brand" aria-label="Menu Gate — home">
        Menu Gate
      </a>
      <div class="mg-nav__links">
        <a href="index.html" class="mg-nav__link">Browse</a>
        <a href="dashboard.html" class="mg-nav__link mg-nav__link--active" aria-current="page">Dashboard</a>
      </div>
      <div class="mg-nav__auth" data-nav-auth aria-label="Account actions"></div>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main id="main-content" class="mg-page">

    <div class="section-header">
      <div>
        <h1 class="section-title">My Menus</h1>
        <!-- Populated by dashboard.js after auth -->
        <p id="dashboardWelcome" class="text-sm text-muted-warm mb-0"></p>
      </div>
      <button type="button" class="btn btn-primary" id="newMenuBtn">
        + New menu
      </button>
    </div>

    <!-- Menu list — loading/empty/error/cards rendered here -->
    <div id="menu-list" aria-live="polite"></div>

  </main>

  <!-- ── Toast container (fixed, top-right) ── -->
  <div
    id="toastContainer"
    aria-live="polite"
    aria-atomic="false"
    style="
      position: fixed;
      top: calc(var(--nav-height) + var(--space-4));
      right: var(--space-6);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-width: 380px;
      pointer-events: none;
    "
  ></div>

  <!-- ── Modal 1: Create / Edit Menu ── -->
  <div
    class="modal fade"
    id="menuFormModal"
    tabindex="-1"
    aria-labelledby="menuModalTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h2 class="modal-title" id="menuModalTitle">New menu</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel"></button>
        </div>

        <form id="menuForm" novalidate>
          <div class="modal-body">

            <!-- Inline error banner -->
            <div
              id="menuFormError"
              class="mg-alert mg-alert--error mb-4"
              role="alert"
              style="display: none;"
            ></div>

            <div class="form-group">
              <label for="menuTitle" class="form-label">
                Title <span aria-hidden="true" style="color:var(--color-danger);">*</span>
              </label>
              <input
                type="text"
                id="menuTitle"
                class="form-control"
                placeholder="e.g. Lunch specials"
                required
                maxlength="255"
                autocomplete="off"
              >
            </div>

            <div class="form-group mb-0">
              <label for="menuCategory" class="form-label">Category</label>
              <input
                type="text"
                id="menuCategory"
                class="form-control"
                placeholder="e.g. Italian, Brunch, Sushi…"
                maxlength="255"
                autocomplete="off"
              >
            </div>

          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="menuSaveBtn">Save</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- ── Modal 2: Add / Edit Item ── -->
  <div
    class="modal fade"
    id="itemFormModal"
    tabindex="-1"
    aria-labelledby="itemModalTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h2 class="modal-title" id="itemModalTitle">Add item</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel"></button>
        </div>

        <form id="itemForm" novalidate>
          <div class="modal-body">

            <!-- Inline error banner -->
            <div
              id="itemFormError"
              class="mg-alert mg-alert--error mb-4"
              role="alert"
              style="display: none;"
            ></div>

            <div class="form-group">
              <label for="itemName" class="form-label">
                Name <span aria-hidden="true" style="color:var(--color-danger);">*</span>
              </label>
              <input
                type="text"
                id="itemName"
                class="form-control"
                placeholder="e.g. Grilled salmon"
                required
                maxlength="255"
                autocomplete="off"
              >
            </div>

            <div class="form-group">
              <label for="itemDescription" class="form-label">Description</label>
              <textarea
                id="itemDescription"
                class="form-control"
                rows="2"
                placeholder="Optional — ingredients, allergens, notes…"
                maxlength="4000"
              ></textarea>
            </div>

            <div class="form-group mb-0">
              <label for="itemPrice" class="form-label">
                Price <span aria-hidden="true" style="color:var(--color-danger);">*</span>
              </label>
              <!-- Bootstrap input-group gives the "$" prefix -->
              <div class="input-group">
                <span class="input-group-text" style="font-family: var(--font-price); background: var(--color-surface-alt); border-color: var(--color-border);">$</span>
                <input
                  type="number"
                  id="itemPrice"
                  class="form-control form-control--price"
                  placeholder="0.00"
                  required
                  min="0.01"
                  step="0.01"
                >
              </div>
            </div>

            <!--
              NOTE: The 'available' toggle is intentionally omitted from this form.
              The backend's MenuItemRequest DTO has no 'available' field, and
              MenuService.addMenuItem() hardcodes available = true on creation.
              MenuService.updateMenuItem() does not update the 'available' field either.
              Availability is shown as a read-only badge in the item list.
              Add the toggle here once the backend supports it.
            -->

          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="itemSaveBtn">Save</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- ── Modal 3: Delete Confirmation ── -->
  <div
    class="modal fade modal--confirm"
    id="confirmModal"
    tabindex="-1"
    aria-labelledby="confirmTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h2 class="modal-title" id="confirmTitle">Delete?</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel"></button>
        </div>

        <!-- Body text is set by dashboard.js per delete target -->
        <div class="modal-body" id="confirmBody"></div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Scripts — load order matters ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
