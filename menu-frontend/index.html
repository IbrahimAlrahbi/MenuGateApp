<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Gate — Browse Menus</title>

  <!-- Preconnect to Google Fonts (loaded via css/style.css @import) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Bootstrap 5 — loaded before our stylesheet so our tokens win -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Skip-to-content for keyboard and screen-reader users -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ── Navigation ── -->
  <nav class="mg-nav" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="mg-nav__brand" aria-label="Menu Gate — home">
        Menu Gate
      </a>

      <div class="mg-nav__links">
        <a href="index.html" class="mg-nav__link mg-nav__link--active" aria-current="page">
          Browse
        </a>
      </div>

      <!-- Populated by auth.js → renderNavAuthState() -->
      <div class="mg-nav__auth" data-nav-auth aria-label="Account actions"></div>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main id="main-content" class="mg-page">

    <!-- Page header: title + search + category filter -->
    <div class="section-header">
      <h1 class="section-title">All Menus</h1>

      <div class="d-flex gap-3 flex-wrap align-items-center">
        <!-- Search -->
        <div class="mg-search">
          <svg
            class="mg-search__icon"
            width="16" height="16" viewBox="0 0 16 16"
            fill="none" aria-hidden="true" focusable="false"
          >
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="searchInput"
            class="form-control mg-search__input"
            placeholder="Search by title or category…"
            aria-label="Search menus by title or category"
            autocomplete="off"
            spellcheck="false"
          >
        </div>

        <!-- Category filter — options populated by browse.js -->
        <select
          id="categoryFilter"
          class="form-select"
          style="width: auto; min-width: 160px;"
          aria-label="Filter menus by category"
        >
          <option value="">All categories</option>
        </select>
      </div>
    </div>

    <!-- Results count — announced to screen readers when it changes -->
    <p
      id="resultsCount"
      class="text-sm text-muted-warm mb-4"
      aria-live="polite"
      aria-atomic="true"
    ></p>

    <!-- Menu grid — <ul> so cards are a proper list for assistive tech -->
    <ul
      id="menu-grid"
      class="card-grid"
      aria-label="Available menus"
    >
      <!-- Skeleton placeholders are injected here during load,
           then replaced with real cards by browse.js -->
    </ul>

  </main>

  <!-- ── Menu detail modal ── -->
  <div
    class="modal fade"
    id="menuDetailModal"
    tabindex="-1"
    aria-labelledby="menuDetailTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header align-items-start">
          <div class="flex-grow-1 me-3">
            <h2 class="modal-title font-display" id="menuDetailTitle"></h2>
            <p class="text-sm text-muted-warm mb-0" id="menuDetailMeta"></p>
          </div>
          <button
            type="button"
            class="btn-close mt-1"
            data-bs-dismiss="modal"
            aria-label="Close menu detail"
          ></button>
        </div>

        <!-- Populated by browse.js on card click -->
        <div class="modal-body" id="menuDetailBody"></div>

      </div>
    </div>
  </div>

  <!-- ── Scripts — load order matters ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/browse.js"></script>

</body>
</html>
