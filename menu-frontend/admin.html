<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Gate — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ── Navigation ── -->
  <nav class="mg-nav" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="mg-nav__brand" aria-label="Menu Gate — home">
        Menu Gate
      </a>
      <div class="mg-nav__links">
        <a href="index.html" class="mg-nav__link">Browse</a>
        <a href="admin.html" class="mg-nav__link mg-nav__link--active" aria-current="page">Admin</a>
      </div>
      <div class="mg-nav__auth" data-nav-auth aria-label="Account actions"></div>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main id="main-content" class="mg-page">

    <div class="section-header">
      <div>
        <h1 class="section-title">All Menus</h1>
        <p class="text-sm text-muted-warm mb-0">Admin view — all owners</p>
      </div>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <!-- Search -->
        <div class="mg-search">
          <svg
            class="mg-search__icon"
            width="16" height="16" viewBox="0 0 16 16"
            fill="none" aria-hidden="true" focusable="false"
          >
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="adminSearch"
            class="form-control mg-search__input"
            placeholder="Search by title or owner…"
            aria-label="Search menus by title or owner email"
            autocomplete="off"
            spellcheck="false"
          >
        </div>
        <!-- Refresh -->
        <button type="button" class="btn btn-secondary btn-sm" id="refreshBtn" aria-label="Refresh menu list">
          ↻ Refresh
        </button>
      </div>
    </div>

    <!-- Results count — announced to screen readers when updated -->
    <p
      id="resultsCount"
      class="text-sm text-muted-warm mb-4"
      aria-live="polite"
      aria-atomic="true"
    ></p>

    <!-- Table wrapper — Bootstrap handles horizontal scroll on small screens -->
    <div class="table-responsive" style="border-radius: var(--radius-lg); border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
      <table class="mg-table" id="adminTable" aria-label="All menus">
        <thead>
          <tr>
            <th scope="col">Menu</th>
            <th scope="col">Owner</th>
            <th scope="col" style="width: 80px; text-align: center;">Items</th>
            <th scope="col" style="width: 100px; text-align: right;">Actions</th>
          </tr>
        </thead>
        <!-- Populated by admin.js -->
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>

  </main>

  <!-- ── Toast container (fixed, top-right) ── -->
  <div
    id="toastContainer"
    aria-live="polite"
    aria-atomic="false"
    style="
      position: fixed;
      top: calc(var(--nav-height) + var(--space-4));
      right: var(--space-6);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-width: 380px;
      pointer-events: none;
    "
  ></div>

  <!-- ── Confirm delete modal ── -->
  <div
    class="modal fade modal--confirm"
    id="confirmModal"
    tabindex="-1"
    aria-labelledby="confirmTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h2 class="modal-title" id="confirmTitle">Delete menu?</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel"></button>
        </div>

        <!-- Populated per delete target by admin.js -->
        <div class="modal-body" id="confirmBody"></div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Scripts — load order matters ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
