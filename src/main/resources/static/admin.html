<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — MenuGate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen" style="zoom: 0.8;">

<!-- Navbar -->
<nav class="bg-white border-b border-stone-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/dashboard.html" class="flex items-center gap-2">
                <span class="text-2xl">🍽️</span>
                <span class="text-xl font-black text-stone-900 tracking-tight">MenuGate</span>
            </a>
            <span class="text-stone-300">|</span>
            <span class="text-sm font-semibold text-red-500 bg-red-50 px-2.5 py-1 rounded-full">Admin Panel</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="/dashboard.html" class="text-sm text-stone-500 hover:text-stone-700 transition-colors">← My Menus</a>
            <button id="logoutBtn" class="text-sm text-stone-500 hover:text-red-500 transition-colors font-medium">Sign out</button>
        </div>
    </div>
</nav>

<!-- Access denied (hidden by default) -->
<div id="accessDenied" class="hidden max-w-md mx-auto text-center px-4 py-24">
    <div class="text-6xl mb-4">🔒</div>
    <h1 class="text-2xl font-black text-stone-900 mb-2">Access Denied</h1>
    <p class="text-stone-500 text-sm mb-6">You need administrator privileges to view this page.</p>
    <a href="/dashboard.html" class="inline-block bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-colors">
        Back to Dashboard
    </a>
</div>

<!-- Main content -->
<main id="mainContent" class="hidden max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-stone-900">All Menus</h1>
            <p class="text-stone-500 text-sm mt-1">Manage menus across all users</p>
        </div>
        <span id="totalCount" class="text-xs bg-stone-100 text-stone-600 px-3 py-1.5 rounded-full font-medium"></span>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="text-center py-20 text-stone-400">
        <div class="text-4xl mb-3 animate-pulse">🔄</div>
        <p class="text-sm">Loading all menus…</p>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="hidden text-center py-20">
        <div class="text-5xl mb-4">📭</div>
        <p class="text-lg font-semibold text-stone-700">No menus in the system</p>
    </div>

    <!-- Table -->
    <div id="tableWrapper" class="hidden">
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-stone-50 border-b border-stone-200">
                        <tr>
                            <th class="text-left px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide">ID</th>
                            <th class="text-left px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide">Title</th>
                            <th class="text-left px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide hidden sm:table-cell">Category</th>
                            <th class="text-left px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide hidden md:table-cell">Owner</th>
                            <th class="text-center px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide hidden sm:table-cell">Items</th>
                            <th class="text-right px-5 py-3.5 text-xs font-bold text-stone-500 uppercase tracking-wide">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-stone-100"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Toast -->
<div id="toast"
     class="hidden fixed bottom-6 right-6 text-white px-5 py-3 rounded-xl shadow-xl z-50 text-sm font-medium pointer-events-none">
</div>

<script type="module">
import { api, checkAuth, logout } from '/js/api.js';

async function init() {
    const user = await checkAuth();
    if (!user) return;

    if (!user.roles.includes('ROLE_ADMIN')) {
        document.getElementById('accessDenied').classList.remove('hidden');
        return;
    }

    document.getElementById('mainContent').classList.remove('hidden');
    await loadAll();
}

async function loadAll() {
    const res = await api.admin.menus();
    if (!res) return;

    const menus = await res.json();

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('totalCount').textContent = `${menus.length} total`;

    if (menus.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
    }

    document.getElementById('tableWrapper').classList.remove('hidden');
    document.getElementById('tableBody').innerHTML = menus.map(row).join('');
}

function row(m) {
    const itemCount = (m.items || []).length;
    return `
    <tr id="row-${m.menuId}" class="hover:bg-stone-50 transition-colors">
        <td class="px-5 py-3.5 text-stone-400 font-mono text-xs">#${m.menuId}</td>
        <td class="px-5 py-3.5">
            <a href="/menu.html?id=${m.menuId}" target="_blank"
               class="font-semibold text-stone-900 hover:text-amber-600 transition-colors">
                ${esc(m.title)}
            </a>
        </td>
        <td class="px-5 py-3.5 hidden sm:table-cell">
            ${m.category ? `<span class="text-xs bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full font-medium">${esc(m.category)}</span>` : '<span class="text-stone-300">—</span>'}
        </td>
        <td class="px-5 py-3.5 hidden md:table-cell text-stone-500 text-xs">${esc(m.ownerEmail)}</td>
        <td class="px-5 py-3.5 hidden sm:table-cell text-center text-stone-500">${itemCount}</td>
        <td class="px-5 py-3.5 text-right">
            <button data-menu="${m.menuId}"
                    class="text-xs border border-red-200 text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors font-medium delete-btn">
                Delete
            </button>
        </td>
    </tr>`;
}

document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;

    const menuId = Number(btn.dataset.menu);
    if (!confirm(`Delete menu #${menuId}? This will also remove all its items.`)) return;

    const res = await api.admin.deleteMenu(menuId);
    if (!res) return;
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.message || 'Could not delete menu', 'error');
        return;
    }

    document.getElementById(`row-${menuId}`)?.remove();
    showToast(`Menu #${menuId} deleted`);

    // Update count
    const body = document.getElementById('tableBody');
    const remaining = body.querySelectorAll('tr').length;
    document.getElementById('totalCount').textContent = `${remaining} total`;
    if (remaining === 0) {
        document.getElementById('tableWrapper').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
    }
});

function esc(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let toastTimer;
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `fixed bottom-6 right-6 text-white px-5 py-3 rounded-xl shadow-xl z-50 text-sm font-medium pointer-events-none
        ${type === 'error' ? 'bg-red-500' : 'bg-stone-800'}`;
    t.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
}

document.getElementById('logoutBtn').addEventListener('click', logout);

init();
</script>
</body>
</html>
